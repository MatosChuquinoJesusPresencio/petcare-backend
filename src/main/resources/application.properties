spring.application.name=backend

spring.config.import=optional:file:.env[.properties]
server.forward-headers-strategy=framework

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:petcaredb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Spring Data JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# SQL Initialization
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Properties
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f8g0h2i4j6k8l0m2n4o6p8q0r2s4t6u8v0w2x4y6z8a0b2c4d}
jwt.expiration=${JWT_EXPIRATION:1800000}
jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Springdoc Swagger-UI configuration
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs

# Server
server.port=${PORT:8080}

# TextBee (WhatsApp/SMS via RF20)
textbee.api.key=${TEXTBEE_API_KEY:}
textbee.gateway.id=${TEXTBEE_GATEWAY_ID:}
textbee.api.url=${TEXTBEE_API_URL:https://api.textbee.dev/api/v1}

# Active profile (dev by default for local H2, override to prod for Render/PostgreSQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}