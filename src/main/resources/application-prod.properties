# Production profile — used when SPRING_PROFILES_ACTIVE=prod (Render/Supabase)

# Database: do NOT run seed scripts (user uploads supabase.sql manually)
spring.sql.init.mode=never

# JPA: validate schema only — tables must exist (created via supabase.sql)
spring.jpa.hibernate.ddl-auto=validate

# SQL logging off
spring.jpa.show-sql=false
