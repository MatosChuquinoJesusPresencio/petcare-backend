# Production profile — used when SPRING_PROFILES_ACTIVE=prod (Render/Supabase)

# Database: do NOT run seed scripts (user uploads supabase.sql manually)
spring.sql.init.mode=never

# JPA: validate schema only — tables must exist (created via supabase.sql)
spring.jpa.hibernate.ddl-auto=validate

# SQL logging off
spring.jpa.show-sql=false

# HikariCP pool — optimized for Render free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=30000
