services:
  - type: web
    name: petcare-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend.jar
    healthCheckPath: /api/auth/me
    healthCheckPolicy:
      initialDelaySeconds: 120
    cron:
      - path: /api/auth/me
        schedule: "*/14 * * * *"
